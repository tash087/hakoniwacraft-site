<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkFlow Pro - カラーカスタマイズ対応</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; }
        #canvas-wrapper { 
            background-color: #0a0a0a;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        .canvas-container { margin: 0 auto !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        /* カラーピッカーの見た目調整 */
        input[type="color"] { -webkit-appearance: none; border: none; width: 40px; height: 40px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #374151; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 overflow-hidden">

    <div class="flex h-screen">
        
        <aside class="w-80 bg-gray-900 border-r border-gray-800 flex flex-col shadow-2xl z-10">
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-2xl font-black text-blue-500 tracking-tighter italic">MARKFLOW PRO</h1>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-8">
                <section>
                    <label class="text-xs font-bold text-blue-400 uppercase mb-3 block">1. 画像をアップロード</label>
                    <input type="file" id="imageLoader" accept="image/*" class="text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-gray-800 file:text-gray-300 hover:file:bg-gray-700 cursor-pointer w-full">
                </section>

                <section>
                    <label class="text-xs font-bold text-blue-400 uppercase mb-3 block">2. 透かしテキスト（改行可）</label>
                    <textarea id="wmInput" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm h-24 resize-none">© Your Name&#10;SAMPLE TEXT</textarea>
                </section>

                <section>
                    <label class="text-xs font-bold text-blue-400 uppercase mb-3 block">3. 透かしの色</label>
                    <div class="flex items-center gap-4 bg-gray-800 p-3 rounded-lg border border-gray-700">
                        <input type="color" id="colorPicker" value="#ffffff">
                        <span id="colorHex" class="text-sm font-mono text-gray-400">#FFFFFF</span>
                    </div>
                </section>

                <section class="space-y-2">
                    <label class="text-xs font-bold text-blue-400 uppercase mb-3 block">4. レイアウト選択</label>
                    <button onclick="applyPreset('standard')" class="w-full bg-gray-800 hover:bg-blue-600 p-3 rounded-xl text-sm transition text-left flex items-center justify-between group">
                        <span>Standard (右下)</span>
                        <span class="opacity-40 group-hover:opacity-100">→</span>
                    </button>
                    <button onclick="applyPreset('tile')" class="w-full bg-gray-800 hover:bg-blue-600 p-3 rounded-xl text-sm transition text-left flex items-center justify-between group">
                        <span>Tile (全体)</span>
                        <span class="opacity-40 group-hover:opacity-100">→</span>
                    </button>
                </section>
            </div>

            <div class="p-6 bg-gray-900 border-t border-gray-800 space-y-3">
                <button id="saveServer" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition shadow-lg flex items-center justify-center gap-2">
                    サーバーに保存
                </button>
                <div id="status" class="text-[10px] text-center text-gray-500 uppercase tracking-widest font-bold">Ready</div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-950 relative">
            <div id="canvas-wrapper" class="flex-1 p-8">
                <canvas id="mainCanvas"></canvas>
            </div>
            <footer class="h-10 border-t border-gray-800 flex items-center justify-between px-6 bg-gray-900 text-[10px] text-gray-500 tracking-wider">
                <div id="imageInfo">画像を待機中...</div>
                <div>COLOR ENGINE: RGBA/HEX</div>
            </footer>
        </main>
    </div>

    <script>
        const canvas = new fabric.Canvas('mainCanvas', { preserveObjectStacking: true });
        let rawWidth, rawHeight;

        // カラーピッカー連動
        const colorPicker = document.getElementById('colorPicker');
        const colorHex = document.getElementById('colorHex');

        colorPicker.addEventListener('input', (e) => {
            const color = e.target.value;
            colorHex.innerText = color.toUpperCase();
            
            // キャンバス上の既存の透かしの色をリアルタイム変更
            canvas.getObjects('i-text').forEach(obj => {
                obj.set('fill', color);
            });
            canvas.renderAll();
        });

        // 画像読み込み
        document.getElementById('imageLoader').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.src = f.target.result;
                img.onload = () => {
                    rawWidth = img.width; rawHeight = img.height;
                    canvas.setWidth(rawWidth); canvas.setHeight(rawHeight);
                    const fImg = new fabric.Image(img, { selectable: false, evented: false });
                    canvas.setBackgroundImage(fImg, canvas.renderAll.bind(canvas));
                    resizeDisplay();
                    document.getElementById('imageInfo').innerText = `IMAGE: ${rawWidth} x ${rawHeight} PX`;
                    updateStatus("Loaded", "text-blue-400");
                };
            };
            reader.readAsDataURL(file);
        });

        function resizeDisplay() {
            if (!rawWidth) return;
            const wrapper = document.getElementById('canvas-wrapper');
            const scale = Math.min((wrapper.clientWidth - 60) / rawWidth, (wrapper.clientHeight - 60) / rawHeight, 1);
            canvas.setZoom(scale);
            canvas.setWidth(rawWidth * scale);
            canvas.setHeight(rawHeight * scale);
        }

        // プリセット適用
        function applyPreset(type) {
            if (!rawWidth) return alert("画像を読み込んでください");
            const textStr = document.getElementById('wmInput').value;
            const activeColor = colorPicker.value;
            
            canvas.getObjects('i-text').forEach(obj => canvas.remove(obj));

            const common = {
                fill: activeColor,
                fontFamily: 'sans-serif',
                lineHeight: 1.1,
                textAlign: 'center'
            };

            if (type === 'standard') {
                canvas.add(new fabric.IText(textStr, {
                    ...common,
                    fontSize: rawWidth * 0.04,
                    opacity: 0.7,
                    left: rawWidth - 50,
                    top: rawHeight - 50,
                    originX: 'right',
                    originY: 'bottom',
                    textAlign: 'right'
                }));
            } else if (type === 'tile') {
                const step = 3;
                for (let x = 0; x <= step; x++) {
                    for (let y = 0; y <= step; y++) {
                        canvas.add(new fabric.IText(textStr, {
                            ...common,
                            fontSize: rawWidth * 0.025,
                            opacity: 0.2,
                            left: (rawWidth / step) * x,
                            top: (rawHeight / step) * y,
                            angle: -30,
                            originX: 'center',
                            originY: 'center'
                        }));
                    }
                }
            }
            canvas.renderAll();
            updateStatus("Applied", "text-blue-400");
        }

        // サーバー保存
        document.getElementById('saveServer').addEventListener('click', async () => {
            if (!rawWidth) return;
            updateStatus("Uploading...", "text-yellow-500");
            const dataURL = canvas.toDataURL({ format: 'png', multiplier: 1 / canvas.getZoom() });
            const formData = new FormData();
            formData.append('image', dataURL);
            try {
                const res = await fetch('save.php', { method: 'POST', body: formData });
                const json = await res.json();
                if(json.success) {
                    updateStatus("Saved", "text-green-500");
                    alert("保存完了: " + json.filename);
                } else { throw new Error(json.message); }
            } catch (e) {
                updateStatus("Error", "text-red-500");
                alert("エラー: " + e.message);
            }
        });

        function updateStatus(msg, color) {
            const s = document.getElementById('status');
            s.innerText = msg; s.className = `text-[10px] text-center uppercase tracking-widest font-bold ${color}`;
        }

        window.addEventListener('resize', resizeDisplay);
    </script>
</body>
</html>
