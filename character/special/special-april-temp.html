<style>
    /* --- 基本レイアウト --- */
    body { background-color: #000 !important; color: #eee; margin: 0; font-family: sans-serif; overflow-x: hidden; }
    body.is-loading { overflow: hidden; }

    /* --- ロード画面 --- */
    #page-loader {
        position: fixed; inset: 0; background: #000; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.6s ease;
    }

    /* --- ヘッダー --- */
    .header-41 {
        background: #000 !important; border-bottom: 1px solid #f00 !important;
        position: sticky; top: 0; z-index: 10000; height: 60px;
    }
    .header-inner {
        max-width: 1200px; margin: 0 auto; display: flex;
        align-items: center; justify-content: space-between; padding: 0 20px; height: 100%;
    }

    /* --- ナビゲーション（スマホ用） --- */
    @media (max-width: 768px) {
        #main-nav {
            position: fixed; top: 60px; right: -100%; /* 初期は隠す */
            width: 80%; height: calc(100vh - 60px);
            background: rgba(0, 0, 0, 0.95); border-left: 2px solid #f00;
            transition: 0.4s ease; padding: 40px 20px; z-index: 9999;
        }
        #main-nav.is-active { right: 0; } /* JSでこれが付くと表示される */
    }

    /* --- ハンバーガーボタン --- */
    .menu-toggle {
        display: block; background: none; border: none; cursor: pointer;
        width: 44px; height: 44px; position: relative; z-index: 10002;
    }
    .menu-toggle .bar {
        display: block; width: 25px; height: 2px; background: #f00;
        margin: 6px auto; transition: 0.3s;
    }
    /* バツ印への変化 */
    .menu-toggle.is-active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .menu-toggle.is-active .bar:nth-child(2) { opacity: 0; }
    .menu-toggle.is-active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* オーバーレイ */
    .nav-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.7); z-index: 9998;
    }
    .nav-overlay.is-active { display: block; }

    /* --- コンテンツスタイル --- */
    .char-main-content { padding-bottom: 100px; }
    .char-card { max-width: 600px; margin: 40px auto; background: #fff; color: #000; border-radius: 8px; overflow: hidden; }
    .footer-41 { border-top: 2px solid #f00; padding: 40px 20px; text-align: center; }
    .server-counter-box { border: 1px solid #f00; padding: 10px; margin: 10px auto; width: fit-content; min-width: 250px; }
</style>
</head>
