<style>
    /* --- 基本スタイル --- */
    .header-41 {
        background: #000 !important;
        border-bottom: 1px solid #f00 !important;
        position: sticky;
        top: 0;
        z-index: 10000;
        height: 60px;
    }
    .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        height: 100%;
    }

    /* --- PCナビゲーション --- */
    #main-nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
        align-items: center;
        margin: 0; padding: 0;
    }
    #main-nav ul li a {
        color: #fff !important;
        text-decoration: none;
        font-weight: 700;
        text-shadow: 0 0 5px #f00;
        transition: 0.3s;
    }

    /* --- ハンバーガーボタン --- */
    .menu-toggle {
        display: none; /* PCでは隠す */
        background: none; border: none; cursor: pointer;
        padding: 10px; z-index: 10002;
        position: relative; width: 44px; height: 44px;
    }
    .menu-toggle .bar {
        display: block; width: 25px; height: 2px;
        background: #f00; margin: 6px auto;
        transition: all 0.3s ease-in-out;
    }

    /* --- スマホ表示（768px以下） --- */
    @media (max-width: 768px) {
        .menu-toggle { display: block; }

        /* ボタンがアクティブな時の「×」アニメーション */
        .menu-toggle.is-active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .menu-toggle.is-active .bar:nth-child(2) { opacity: 0; }
        .menu-toggle.is-active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        #main-nav {
            position: fixed;
            top: 60px; right: -100%; /* 閉じてる時は右に隠す */
            width: 80%; height: calc(100vh - 60px);
            background: rgba(0, 0, 0, 0.95);
            border-left: 2px solid #f00;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px;
            overflow-y: auto;
            z-index: 9999;
            box-shadow: -10px 0 20px rgba(255, 0, 0, 0.2);
        }
        /* メニューが開いた時 */
        #main-nav.is-active { right: 0; }

        #main-nav ul {
            flex-direction: column;
            align-items: flex-start;
            gap: 25px;
        }

        /* スマホ版ドロップダウン展開 */
        .dropdown-content {
            display: block;
            position: static;
            background: none !important;
            border: none !important;
            padding-left: 15px;
            margin-top: 10px;
            border-left: 1px solid #444 !important;
        }
    }

    /* 背景オーバーレイ（メニューが開いている時だけ表示） */
    .nav-overlay {
        display: none;
        position: fixed;
        top: 60px; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        z-index: 9998;
    }
    .nav-overlay.is-active { display: block; }
</style>

<header class="header-41">
    <div class="header-inner">
        <a href="https://uni-guild.com/index.html" class="header-link"> 
            <div class="logo-wrapper" style="position: relative;">
                <img src="https://uni-guild.com/images/server_icon.png" alt="ロゴ" class="server-icon" style="height:35px; filter: grayscale(1) invert(1) sepia(1) saturate(10) hue-rotate(-50deg);">
                <span style="position:absolute; top:-5px; left:-5px; background:red; color:white; font-size:9px; padding:2px; font-weight:bold; box-shadow: 0 0 8px #f00;">50,000dpi</span>
            </div>
        </a>
        
        <button id="menu-toggle" class="menu-toggle" onclick="toggleMenu()">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav id="main-nav">
            <ul>
                <li><a href="https://uni-guild.com/index.html">現実へ戻る</a></li>
                <li class="dropdown">
                    <a href="#" style="color: #ff0 !important;">⚠ 異常検知</a>
                    <div class="dropdown-content">
                        <a href="#">高画質すぎて網膜が痛い</a>
                        <a href="#">おじさんと目が合った</a>
                        <a href="#">部屋に缶コーヒーがある</a>
                    </div>
                </li>
                <li>
                    <a href="https://uni-guild.com/special/terms/termsapril-ojisan.html" style="font-weight: 900; color: #fff !important; background: #f00; padding: 10px 20px; border-radius: 4px; display: inline-block;">
                        特別利用規約
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<div id="nav-overlay" class="nav-overlay" onclick="toggleMenu()"></div>

<script>
    function toggleMenu() {
        const btn = document.getElementById('menu-toggle');
        const nav = document.getElementById('main-nav');
        const overlay = document.getElementById('nav-overlay');
        
        // is-active クラスを付け外しする
        btn.classList.toggle('is-active');
        nav.classList.toggle('is-active');
        overlay.classList.toggle('is-active');

        // メニュー開閉時に背景スクロールを止める（おまけの親切設計）
        if (nav.classList.contains('is-active')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = '';
        }
    }
</script>
