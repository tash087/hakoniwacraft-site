<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://uni-guild.com/css/common-v1.0.css">
<link rel="stylesheet" href="https://uni-guild.com/css/style-v1.0.css">
<link rel="stylesheet" href="https://uni-guild.com/css/about-update-v1.0.css">
<link rel="stylesheet" href="https://uni-guild.com/css/news-v1.0.css">
<link rel="shortcut icon" href="https://uni-guild.com/images/server_icon.png" type="image/png">
<!-- 全サイト共通JS -->
<script src="https://uni-guild.com/js/include-v1.1.js" defer></script>
<script src="https://uni-guild.com/js/day-count-v1.1.js" defer></script>
<script src="https://uni-guild.com/js/slider-v1.0.js" defer></script>
<script src="https://uni-guild.com/js/query/query-v2.1.2.js" defer></script>
<!-- Contact 専用 -->
<link rel="stylesheet" href="https://uni-guild.com/css/contact-v1.0.css"
<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script></head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="hero" style="padding: 100px 20px;">
            <div class="hero-content">
                <span class="badge">Contact</span>
                <h1>お問い合わせ</h1>
                <p>ご質問・ご要望などお気軽にお寄せください</p>
            </div>
        </section>

        <section class="section container">
            <div class="login-container">
                <div class="login-card">
                    <form action="send-v3.2.php" method="POST" class="login-form">
                        
                        <div class="form-group">
                            <label for="name">お名前（MCIDなど）</label>
                            <input type="text" id="name" name="name" placeholder="Hakoniwa_Taro" required>
                        </div>

                        <div class="form-group">
                            <label for="email">返信用メールアドレス</label>
                            <input type="email" id="email" name="email" placeholder="mail@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="subject">件名</label>
                            <input type="text" id="subject" name="subject" placeholder="不具合報告 / 質問など" required>
                        </div>

                        <div class="form-group">
                            <label for="message">お問い合わせ内容</label>
                            <textarea id="message" name="message" rows="8" 
                                style="width: 100%; padding: 14px 16px; border: 2px solid #f0ede9; border-radius: 15px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 1rem; color: var(--text-color); background-color: #fafafa; transition: all 0.3s ease; resize: vertical;" 
                                placeholder="内容を詳しくご記入ください" required></textarea>
                        </div>

                        <div class="notice-simple-box" style="margin-bottom: 20px; font-size: 0.8rem; padding: 15px; border-radius: 15px;">
                            <p>送信前に<a href="../pages/terms-list.html" style="color: var(--primary-color); font-weight: bold;">規約・ガイドライン</a>をご確認ください。</p>
                        </div>



<div class="form-group" style="display: flex; justify-content: center; margin-bottom: 20px;">
    <div class="cf-turnstile" data-sitekey="0x4AAAAAACuYCgGwnWsvAE-_"></div>
</div>

<button type="submit" class="btn-nav btn-primary-nav login-submit-btn" style="border: none; width: 100%;">
    内容を送信する
</button>
                    </form>

                    <div class="login-footer-links">
                        <p>Discordの方が早く対応できる場合があります。<br>
                        <a href="https://discord.gg/g3g4AwuBRE" target="_blank">公式Discordはこちら</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
