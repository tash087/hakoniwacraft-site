<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>店舗管理（管理者）</title>
    <link rel="stylesheet" href="../css/shop/style.css">
    <style>
        .shop-table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        .shop-table th, .shop-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .shop-table input { width: 95%; border: none; background: transparent; text-align: center; }
        .add-row-btn { margin-top: 10px; padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>店舗データ管理（サーバー保存）</h1>
    <section class="lottery-panel">
        <select id="targetSheet"></select>
        <input type="text" id="playerID" placeholder="Minecraft ID">
        <button onclick="runLottery()">抽選実行</button>
        <button onclick="saveAll()" id="saveBtn" style="background:#2ecc71; color:white;">サーバーへ保存</button>
        <div id="statusLabel" class="status-msg"></div>
    </section>
    <div id="tables-container"></div>
</div>

<script src="../js/common.js"></script>
<script>
let currentData = {};
async function init() {
    currentData = await loadData();
    const container = document.getElementById('tables-container');
    const select = document.getElementById('targetSheet');
    container.innerHTML = '';
    for (let key in SHOP_CONFIG) {
        const opt = document.createElement('option');
        opt.value = key; opt.textContent = SHOP_CONFIG[key].title;
        select.appendChild(opt);
        if (!currentData[key]) currentData[key] = Array.from({length: SHOP_CONFIG[key].rows}, (_, i) => ({ id: i+1, mcid: '', date: '', note: '' }));
        const section = document.createElement('div');
        section.innerHTML = `<h2>${SHOP_CONFIG[key].title}</h2><table class="shop-table"><thead><tr><th>番地</th><th>MCID</th><th>期限</th><th>備考</th><th>×</th></tr></thead><tbody id="body-${key}"></tbody></table><button class="add-row-btn" onclick="addRow('${key}')">+ 行追加</button>`;
        container.appendChild(section);
        renderTable(key);
    }
}
function renderTable(key) {
    const tbody = document.getElementById(`body-${key}`);
    tbody.innerHTML = '';
    currentData[key].forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" value="${row.id}" onchange="updateData('${key}',${index},'id',this.value)"></td><td><input type="text" value="${row.mcid}" onchange="updateData('${key}',${index},'mcid',this.value)"></td><td><input type="text" value="${row.date}" onchange="updateData('${key}',${index},'date',this.value)"></td><td><input type="text" value="${row.note}" onchange="updateData('${key}',${index},'note',this.value)"></td><td><button onclick="deleteRow('${key}',${index})">×</button></td>`;
        tbody.appendChild(tr);
    });
}
function updateData(k,i,f,v){ currentData[k][i][f]=v; }
function addRow(k){ currentData[k].push({id:currentData[k].length+1,mcid:'',date:'',note:''}); renderTable(k); }
function deleteRow(k,i){ if(confirm('削除しますか？')){ currentData[k].splice(i,1); renderTable(k); }}
async function runLottery() {
    const key = document.getElementById('targetSheet').value;
    const mcid = document.getElementById('playerID').value.trim();
    if(!mcid) return alert('ID入力');
    const emptyRows = currentData[key].filter(r => !r.mcid);
    if(emptyRows.length === 0) return alert('満員');
    const win = emptyRows[Math.floor(Math.random()*emptyRows.length)];
    win.mcid = mcid; win.date = "03/31";
    renderTable(key);
    await saveAll();
}
async function saveAll() {
    const btn = document.getElementById('saveBtn');
    btn.innerText = "保存中...";
    const success = await saveData(currentData);
    btn.innerText = "サーバーへ保存";
    if(success) alert('保存完了'); else alert('失敗（権限不足）');
}
window.onload = init;
</script>
</body>
</html>
