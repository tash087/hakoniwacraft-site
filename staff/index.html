<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運営紹介 - 箱庭クラフト！</title>
    <!-- 共通CSS -->
    <link rel="stylesheet" href="/css/common-v1.0.1css">
    <link rel="stylesheet" href="/css/concept-v1.0.css">
    <link rel="stylesheet" href="/css/contact-v1.0.css">
    <link rel="stylesheet" href="/css/style-v1.0.css">
    <link rel="stylesheet" href="/css/news-v1.0.css">
    <!-- 共通Image -->
    <link rel="shortcut icon" href="/images/server_icon.png" type="image/png">
    <!-- 共通JS -->
    <script src="/js/include-v1.1.js" defer></script>
    <script src="/js/day-count-v1.1.js" defer></script>
    <script src="/js/slider-v1.0.js" defer></script>
    <!-- queryパラ取得 限定[js] -->
    <script src="/js/query/query-google-api.js"></script>
    <!-- ダークモードJS -->
    <script src="/js/dark-mode.js" defer></script>
    <!-- ダークモードCSS（既存CSSより後に読み込み） -->
    <link rel="stylesheet" href="/css/dark-mode.css">
    <!-- ページ固有CSS -->
    <link rel="stylesheet" href="data/staff-v1.2.css"> 
    <style>
        /* 一覧ページ専用の簡易スタイル */
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .staff-card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .staff-card:hover {
            transform: translateY(-5px);
        }
        .staff-card-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid var(--primary-orange);
        }
        .staff-card-name {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .staff-card-role {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
        .staff-card-emoji {
            font-size: 1.5rem;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container section-padding">
        <h1 class="page-title text-center">STAFF</h1>
        <p class="text-center">「箱庭クラフト！」を支える運営メンバーをご紹介します。</p>

        <div id="staff-list-container" class="staff-grid">
            <p>読み込み中...</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // JSONデータを読み込んで一覧を生成
        async function loadStaffList() {
            const container = document.getElementById('staff-list-container');
            try {
                const response = await fetch('data/staff_data-v1.2.json');
                if (!response.ok) throw new Error('ネットワークエラー');
                const data = await response.json();
                const staff = data.staff;

                container.innerHTML = ''; // ローディング表示をクリア

                // メンバーごとにカードを作成
                Object.keys(staff).forEach(key => {
                    const member = staff[key];
                    const card = document.createElement('a');
                    card.href = `member.php?name=${member.id}`; // PHP詳細ページへ
                    card.className = 'staff-card';
                    
                    card.innerHTML = `
                        <span class="staff-card-emoji">${member.icon_emoji}</span>
                        <img src="../images/${member.id}_icon.png" alt="${member.name}" class="staff-card-icon" onerror="this.src='../images/default_icon.png'">
                        <div class="staff-card-name">${member.name}</div>
                        <div class="staff-card-role">${member.role_lead}</div>
                        <div class="staff-status" style="display:inline-block; font-size:0.8rem; background:#f0f0f0; padding:2px 8px; border-radius:4px;">
                            ${member.status}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<p>データの読み込みに失敗しました。</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadStaffList);
    </script>
    <script src="https://uni-guild.com/js/include.js" defer></script>
    <script src="https://uni-guild.com/js/day-count.js" defer></script>
</body>
</html>
